<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Calco</title>

<!-- Manifest inline -->
<script>
  const manifest = {
    name: "Calco — Tracing Tool",
    short_name: "Calco",
    description: "Calca imágenes con la cámara de tu móvil",
    start_url: ".",
    display: "standalone",
    background_color: "#ffffff",
    theme_color: "#000000",
    orientation: "portrait",
    icons: [
      {
        src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1MTIiIGhlaWdodD0iNTEyIiB2aWV3Qm94PSIwIDAgNTEyIDUxMiI+CiAgPHJlY3Qgd2lkdGg9IjUxMiIgaGVpZ2h0PSI1MTIiIHJ4PSIxMTIiIGZpbGw9IiMwMDAwMDAiLz4KICA8dGV4dCB4PSIyNTYiIHk9IjM0MCIgZm9udC1mYW1pbHk9Ikdlb3JnaWEsIHNlcmlmIiBmb250LXNpemU9IjI4MCIgZm9udC13ZWlnaHQ9IjQwMCIgCiAgICAgICAgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI2ZmZmZmZiI+QzwvdGV4dD4KPC9zdmc+",
        sizes: "512x512",
        type: "image/svg+xml",
        purpose: "any maskable"
      }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.currentScript.after(link);
</script>
<link href="https://fonts.googleapis.com/css2?family=Mansalva&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  background: #fff;
  height: 100dvh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ── HEADER (v1_47) ── */
.header {
  width: 100%;
  height: 106px;
  background: #fff;
  border-bottom: 1px solid #ebebeb;
  padding: 20px 48px;
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* Logo (v1_12 / v1_9 / v1_10) */
.logo {
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.logo-name {
  font-family: 'Mansalva', cursive;
  font-size: 30px;
  font-weight: 400;
  color: #000;
  line-height: 1;
}
.logo-sub {
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 400;
  color: #000;
  margin-top: 4px;
  opacity: 0.5;
}

/* Icons top-right (v1_13) */
.header-icons {
  display: flex;
  align-items: center;
  gap: 20px;
}
.hicon {
  width: 24px; height: 24px;
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
  border-radius: 4px;
  transition: opacity .15s;
  color: #000;
}
.hicon:active { opacity: 0.5; }
.hicon.active { opacity: 1; }
.hicon svg { width: 18px; height: 18px; }

/* ── STAGE (v1_37) ── */
.stage {
  width: 100%;
  flex: 1;
  background: #fff;
  position: relative;
  overflow: hidden;
}

video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

#overlayImg {
  position: absolute; top: 0; left: 0;
  cursor: grab; touch-action: none; user-select: none;
  transform-origin: top left; display: none; max-width: none;
}
#overlayImg.dragging { cursor: grabbing; }

/* Placeholder texts (v1_49 / v1_52) */
.placeholder {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 0;
}
.placeholder-line {
  font-family: 'Mansalva', cursive;
  font-size: 45px;
  font-weight: 400;
  color: #000;
  text-align: center;
  opacity: 0.12;
  line-height: 1.15;
}

/* grid & crosshair */
#gridOverlay {
  position: absolute; inset: 0; pointer-events: none; display: none;
  background-image: linear-gradient(rgba(0,0,0,.07) 1px, transparent 1px), linear-gradient(90deg, rgba(0,0,0,.07) 1px, transparent 1px);
  background-size: 40px 40px;
}
#gridOverlay.visible { display: block; }
#crosshair { position: absolute; inset: 0; pointer-events: none; display: none; }
#crosshair.visible { display: block; }
#crosshair::before, #crosshair::after { content: ''; position: absolute; background: rgba(0,0,0,.12); }
#crosshair::before { top: 50%; left: 0; right: 0; height: 1px; }
#crosshair::after { left: 50%; top: 0; bottom: 0; width: 1px; }

/* info badge */
#infoBadge {
  position: absolute; top: 14px; left: 14px;
  background: rgba(255,255,255,.9); backdrop-filter: blur(8px);
  border: 1px solid #e0e0e0; border-radius: 20px;
  padding: 5px 14px; font-size: 11px; color: #999;
  display: none; pointer-events: none; font-family: 'Poppins', sans-serif;
}
#infoBadge.visible { display: block; }
#flipBadge {
  position: absolute; top: 14px; right: 14px;
  background: #000; color: #fff; border-radius: 20px;
  padding: 5px 14px; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
  font-family: 'Poppins', sans-serif; display: none;
}
#flipBadge.visible { display: block; }

/* ── SLIDERS BAR (v1_57) ── */
.sliders-bar {
  width: 100%;
  height: 78px;
  background: #fff;
  border-top: 1px solid #ebebeb;
  padding: 20px 48px;
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 0;
}

/* Each slider group (v1_69 / v1_71) */
.slider-group {
  flex: 1;
  position: relative;
}
.slider-group + .slider-group { margin-left: 78px; }

.slider-labels {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.slider-label-left {
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 400;
  color: #000;
}
.slider-label-right {
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 400;
  color: #000;
  text-align: right;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%; height: 1.5px;
  background: #ccc; border-radius: 1px; outline: none;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: #000; cursor: pointer;
  border: 2.5px solid #fff; box-shadow: 0 0 0 1.5px #000;
}

/* ── BUTTONS BAR (v1_82) ── */
.buttons-bar {
  width: 100%;
  height: 89px;
  background: #fff;
  border-top: 1px solid #ebebeb;
  padding: 25px 48px;
  position: relative;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
}

/* Pill buttons (v1_75 / v1_76 / v1_79) */
.btn-pill {
  flex: 1;
  height: 39px;
  border-radius: 100px;
  border: 1px solid #000;
  background: #fff;
  color: #000;
  font-family: 'Poppins', sans-serif;
  font-size: 15px;
  font-weight: 400;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.btn-pill:active, .btn-pill.filled { background: #000; color: #fff; }
.btn-pill.filled:active { background: #222; }

.btn-pill-sm {
  width: 39px; height: 39px;
  border-radius: 100px;
  border: 1px solid #ddd;
  background: #fff; color: #000;
  font-family: 'Poppins', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, color .15s, border-color .15s;
  flex-shrink: 0;
}
.btn-pill-sm:active { background: #000; color: #fff; border-color: #000; }

/* toast */
#toast {
  position: fixed; bottom: 110px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #000; color: #fff;
  padding: 9px 22px; border-radius: 100px;
  font-family: 'Poppins', sans-serif; font-size: 13px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s;
  white-space: nowrap; z-index: 999;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">
    <div class="logo-name">Calco</div>
    <div class="logo-sub">Tracing tool</div>
  </div>
  <div class="header-icons">
    <!-- Grid -->
    <button class="hicon" id="btnGrid" title="Cuadrícula">
      <svg viewBox="0 0 18 18" fill="none"><rect x="1" y="1" width="6" height="6" rx="0.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="1" width="6" height="6" rx="0.5" stroke="currentColor" stroke-width="1.4"/><rect x="1" y="11" width="6" height="6" rx="0.5" stroke="currentColor" stroke-width="1.4"/><rect x="11" y="11" width="6" height="6" rx="0.5" stroke="currentColor" stroke-width="1.4"/></svg>
    </button>
    <!-- Crosshair -->
    <button class="hicon" id="btnCross" title="Centro">
      <svg viewBox="0 0 18 18" fill="none"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.4"/><line x1="9" y1="2" x2="9" y2="16" stroke="currentColor" stroke-width="1.4"/><line x1="2" y1="9" x2="16" y2="9" stroke="currentColor" stroke-width="1.4"/></svg>
    </button>
    <!-- Flip -->
    <button class="hicon" id="btnFlipBtn" title="Espejo">
      <svg viewBox="0 0 18 18" fill="none"><path d="M7.5 3.5L3.5 9L7.5 14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.5 3.5L14.5 9L10.5 14.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <!-- Switch cam -->
    <button class="hicon" id="btnCamSwitch" title="Cambiar cámara">
      <svg viewBox="0 0 18 18" fill="none"><path d="M2 6C2 5.17 2.67 4.5 3.5 4.5H5L6 3H12L13 4.5H14.5C15.33 4.5 16 5.17 16 6V12C16 12.83 15.33 13.5 14.5 13.5H3.5C2.67 13.5 2 12.83 2 12V6Z" stroke="currentColor" stroke-width="1.4"/><circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.4"/></svg>
    </button>
  </div>
</div>

<!-- STAGE -->
<div class="stage" id="stage">
  <video id="videoEl" playsinline autoplay muted></video>
  <img id="overlayImg" draggable="false" />
  <div id="gridOverlay"></div>
  <div id="crosshair"></div>
  <div class="placeholder" id="placeholder">
    <div class="placeholder-line">Activa la cámara</div>
    <div class="placeholder-line">y sube una imagen</div>
  </div>
  <div id="infoBadge"></div>
  <div id="flipBadge">Espejo</div>
</div>

<!-- SLIDERS BAR -->
<div class="sliders-bar">
  <div class="slider-group">
    <div class="slider-labels">
      <span class="slider-label-left">Opacidad</span>
      <span class="slider-label-right" id="valOpacity">60%</span>
    </div>
    <input type="range" id="sliderOpacity" min="0" max="100" value="60">
  </div>
  <div class="slider-group">
    <div class="slider-labels">
      <span class="slider-label-left">Escala</span>
      <span class="slider-label-right" id="valScale">100%</span>
    </div>
    <input type="range" id="sliderScale" min="10" max="300" value="100">
  </div>
</div>

<!-- BUTTONS BAR -->
<div class="buttons-bar">
  <button class="btn-pill filled" id="btnCamStart">
    <svg width="15" height="15" viewBox="0 0 18 18" fill="none"><path d="M2 6C2 5.17 2.67 4.5 3.5 4.5H5L6 3H12L13 4.5H14.5C15.33 4.5 16 5.17 16 6V12C16 12.83 15.33 13.5 14.5 13.5H3.5C2.67 13.5 2 12.83 2 12V6Z" stroke="currentColor" stroke-width="1.5"/><circle cx="9" cy="9" r="2.2" stroke="currentColor" stroke-width="1.5"/></svg>
    Cámara
  </button>
  <button class="btn-pill" id="btnUpload">
    <svg width="15" height="15" viewBox="0 0 18 18" fill="none"><path d="M15 11v3a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><polyline points="12.5 6 9 2.5 5.5 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><line x1="9" y1="2.5" x2="9" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Subir
  </button>
  <button class="btn-pill" id="btnPaste">
    <svg width="15" height="15" viewBox="0 0 18 18" fill="none"><rect x="7" y="1.5" width="4" height="3" rx="0.5" stroke="currentColor" stroke-width="1.5"/><path d="M7 2.5H5a1.5 1.5 0 0 0-1.5 1.5v11A1.5 1.5 0 0 0 5 17h8a1.5 1.5 0 0 0 1.5-1.5V4A1.5 1.5 0 0 0 13 2.5h-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
    Pegar
  </button>
  <button class="btn-pill-sm" id="btnClear" style="display:none" title="Eliminar imagen">
    <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><line x1="1" y1="1" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><line x1="13" y1="1" x2="1" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
</div>

<input type="file" id="fileInput" accept="image/*" style="display:none">
<div id="toast"></div>

<script>
const state = {
  stream: null, facingMode: 'environment',
  imgLoaded: false, flipped: false,
  posX: 0, posY: 0, scale: 1, opacity: 0.6,
  dragging: false, startX: 0, startY: 0, origX: 0, origY: 0,
  pinching: false, pinchDist: 0, pinchScale: 1,
};
const video = document.getElementById('videoEl');
const overlay = document.getElementById('overlayImg');
const stage = document.getElementById('stage');
const infoBadge = document.getElementById('infoBadge');
const flipBadge = document.getElementById('flipBadge');

async function startCamera() {
  try {
    if (state.stream) state.stream.getTracks().forEach(t => t.stop());
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: state.facingMode }, audio: false });
    state.stream = stream;
    video.srcObject = stream;
    document.getElementById('placeholder').style.display = 'none';
    toast('Cámara activa');
  } catch(e) { toast('No se pudo acceder a la cámara'); }
}

document.getElementById('btnCamStart').addEventListener('click', startCamera);
document.getElementById('btnCamSwitch').addEventListener('click', () => {
  state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
  if (state.stream) startCamera(); else toast('Activa la cámara primero');
});

function applyTransform() {
  const sx = state.flipped ? -state.scale : state.scale;
  overlay.style.transform = `translate(${state.posX}px,${state.posY}px) scale(${sx},${state.scale})`;
  overlay.style.opacity = state.opacity;
  if (state.imgLoaded) {
    infoBadge.classList.add('visible');
    infoBadge.textContent = `${Math.round(state.posX)}, ${Math.round(state.posY)}  ·  ${Math.round(state.scale*100)}%`;
  }
}

document.getElementById('sliderOpacity').addEventListener('input', function() {
  state.opacity = this.value / 100;
  document.getElementById('valOpacity').textContent = this.value + '%';
  if (state.imgLoaded) overlay.style.opacity = state.opacity;
});
document.getElementById('sliderScale').addEventListener('input', function() {
  state.scale = this.value / 100;
  document.getElementById('valScale').textContent = this.value + '%';
  if (state.imgLoaded) applyTransform();
});

function loadImage(src) {
  overlay.src = src;
  overlay.onload = () => {
    state.imgLoaded = true;
    state.posX = (stage.offsetWidth - overlay.naturalWidth) / 2;
    state.posY = (stage.offsetHeight - overlay.naturalHeight) / 2;
    state.scale = 1;
    document.getElementById('sliderScale').value = 100;
    document.getElementById('valScale').textContent = '100%';
    overlay.style.display = 'block';
    document.getElementById('btnClear').style.display = '';
    applyTransform();
    toast('Imagen cargada');
  };
}

document.getElementById('btnPaste').addEventListener('click', async () => {
  try {
    const items = await navigator.clipboard.read();
    for (const item of items) {
      const type = item.types.find(t => t.startsWith('image/'));
      if (type) { loadImage(URL.createObjectURL(await item.getType(type))); return; }
    }
    toast('No hay imagen en el portapapeles');
  } catch(e) { toast('Usa el botón Subir o Ctrl+V'); }
});
document.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) { loadImage(URL.createObjectURL(item.getAsFile())); return; }
  }
});
document.getElementById('btnUpload').addEventListener('click', () => document.getElementById('fileInput').click());
document.getElementById('fileInput').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (file) loadImage(URL.createObjectURL(file)); e.target.value = '';
});
document.getElementById('btnClear').addEventListener('click', () => {
  overlay.style.display = 'none'; state.imgLoaded = false;
  infoBadge.classList.remove('visible');
  document.getElementById('btnClear').style.display = 'none';
  toast('Imagen eliminada');
});

// Mouse
overlay.addEventListener('mousedown', (e) => {
  if (!state.imgLoaded) return;
  state.dragging = true;
  state.startX = e.clientX; state.startY = e.clientY;
  state.origX = state.posX; state.origY = state.posY;
  overlay.classList.add('dragging'); e.preventDefault();
});
window.addEventListener('mousemove', (e) => {
  if (!state.dragging) return;
  state.posX = state.origX + (e.clientX - state.startX);
  state.posY = state.origY + (e.clientY - state.startY);
  applyTransform();
});
window.addEventListener('mouseup', () => { state.dragging = false; overlay.classList.remove('dragging'); });

// Touch
function getDist(t1, t2) { return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY); }
overlay.addEventListener('touchstart', (e) => {
  if (!state.imgLoaded) return;
  if (e.touches.length === 1) {
    state.dragging = true; state.pinching = false;
    state.startX = e.touches[0].clientX; state.startY = e.touches[0].clientY;
    state.origX = state.posX; state.origY = state.posY;
  } else if (e.touches.length === 2) {
    state.dragging = false; state.pinching = true;
    state.pinchDist = getDist(e.touches[0], e.touches[1]); state.pinchScale = state.scale;
  }
  e.preventDefault();
}, { passive: false });
overlay.addEventListener('touchmove', (e) => {
  if (e.touches.length === 1 && state.dragging) {
    state.posX = state.origX + (e.touches[0].clientX - state.startX);
    state.posY = state.origY + (e.touches[0].clientY - state.startY);
    applyTransform();
  } else if (e.touches.length === 2 && state.pinching) {
    const dist = getDist(e.touches[0], e.touches[1]);
    state.scale = Math.min(3, Math.max(0.1, state.pinchScale * (dist / state.pinchDist)));
    document.getElementById('sliderScale').value = Math.round(state.scale * 100);
    document.getElementById('valScale').textContent = Math.round(state.scale * 100) + '%';
    applyTransform();
  }
  e.preventDefault();
}, { passive: false });
overlay.addEventListener('touchend', () => { state.dragging = false; state.pinching = false; });

document.getElementById('btnGrid').addEventListener('click', function() {
  document.getElementById('gridOverlay').classList.toggle('visible');
  this.classList.toggle('active');
});
document.getElementById('btnCross').addEventListener('click', function() {
  document.getElementById('crosshair').classList.toggle('visible');
  this.classList.toggle('active');
});
document.getElementById('btnFlipBtn').addEventListener('click', function() {
  state.flipped = !state.flipped;
  flipBadge.classList.toggle('visible', state.flipped);
  this.classList.toggle('active', state.flipped);
  if (state.imgLoaded) applyTransform();
});

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}
</script>
</body>
</html>
